<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majad Training</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--s1:#101010;--s2:#181818;--border:#2a2a2a;--border2:#333;--text:#f2f2f2;--muted:#555;--muted2:#888;--push:#f0c040;--pull:#40d0f0;--legs:#f06050;--green:#50e090;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:52px;gap:4px;}
.nav-brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;color:var(--push);margin-right:auto;}
.nav-btn{padding:7px 13px;border:none;border-radius:7px;background:transparent;color:var(--muted2);font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.nav-btn.active{color:var(--text);background:var(--s2);border:1px solid var(--border2);}
.view{display:none;padding:20px 16px 80px;max-width:860px;margin:0 auto;}
.view.active{display:block;}
.sec-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:40px;letter-spacing:1px;margin-bottom:20px;}
.sched{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:24px;}
.sd{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.15s;}
.sd.today{border-color:var(--push);}
.sd-name{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.sd-icon{font-size:16px;margin-bottom:3px;}
.sd-type{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.sd-today-lbl{font-size:7px;color:var(--muted);margin-top:2px;}
.wcard{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.wcard-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.wcard-badge{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.wcard-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:1px;line-height:1;}
.wcard-sub{font-size:12px;color:var(--muted2);margin-top:3px;}
.wcard-stats{display:flex;border-bottom:1px solid var(--border);}
.ws-item{flex:1;padding:11px 16px;border-right:1px solid var(--border);text-align:center;}
.ws-item:last-child{border-right:none;}
.ws-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;line-height:1;}
.ws-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.warmup-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.wu-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.wu-chip{font-size:11px;color:var(--muted2);background:var(--s2);border:1px solid var(--border);padding:3px 8px;border-radius:5px;}
.ex-row{border-bottom:1px solid var(--border);padding:14px 16px;}
.ex-row:last-child{border-bottom:none;}
.ex-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.ex-num{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.ex-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.ex-tip{font-size:11px;color:var(--muted2);font-style:italic;}
.ex-targets{display:flex;gap:6px;flex-wrap:wrap;margin-left:32px;margin-bottom:10px;}
.ex-tg{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--muted2);}
.ex-tg b{color:var(--text);}
.log-wrap{margin-left:32px;}
.log-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.set-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.set-lbl{width:38px;font-size:11px;color:var(--muted);letter-spacing:1px;flex-shrink:0;}
.set-inp{width:68px;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;text-align:center;}
.set-inp:focus{outline:none;border-color:var(--border2);}
.set-inp.logged{border-color:var(--green);color:var(--green);}
.set-sep{font-size:11px;color:var(--muted);}
.set-rpe{width:50px;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;text-align:center;}
.set-rpe:focus{outline:none;border-color:var(--border2);}
.set-rpe-lbl{font-size:9px;color:var(--muted);}
.set-done{width:28px;height:28px;border-radius:7px;background:var(--s2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.set-done.checked{background:rgba(80,224,144,0.1);border-color:var(--green);color:var(--green);}
.finish-wrap{padding:16px 18px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-finish{padding:11px 24px;border-radius:9px;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
.save-msg{font-size:13px;font-weight:600;display:none;}
.ol-note{padding:11px 13px;border-radius:8px;font-size:12px;display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.run-inp-lbl{font-size:11px;color:var(--muted2);margin-bottom:6px;}
.plan-card{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:14px;}
.plan-head{padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:11px;}
.plan-card.open .plan-head{border-bottom:1px solid var(--border);}
.plan-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.plan-day-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:1px;}
.plan-muscles{font-size:11px;color:var(--muted2);margin-top:1px;}
.plan-count{margin-left:auto;font-size:11px;color:var(--muted);}
.plan-body{display:none;padding:14px 18px 18px;}
.plan-card.open .plan-body{display:block;}
.plan-wu{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.plan-wu-chip{font-size:11px;color:var(--muted2);background:var(--s2);border:1px solid var(--border);padding:3px 9px;border-radius:5px;}
.plan-ex{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.plan-ex:last-child{border-bottom:none;}
.plan-en{width:21px;height:21px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;}
.plan-ex-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.plan-ex-tip{font-size:11px;color:var(--muted2);font-style:italic;margin-bottom:5px;}
.plan-chips{display:flex;gap:5px;flex-wrap:wrap;}
.plan-chip{font-size:11px;color:var(--muted2);background:var(--s2);border:1px solid var(--border);padding:3px 8px;border-radius:5px;}
.prog-empty{padding:40px 0;text-align:center;color:var(--muted);font-size:14px;}
.prog-card{background:var(--s1);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:12px;}
.prog-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.prog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.prog-name{font-weight:600;font-size:13px;flex:1;}
.prog-count{font-size:11px;color:var(--muted);}
.prog-body{padding:13px 16px;}
.prog-sess{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.prog-sess:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.prog-date{font-size:11px;color:var(--muted2);margin-bottom:6px;}
.prog-sets{display:flex;flex-wrap:wrap;gap:5px;}
.prog-set{background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:12px;color:var(--muted2);}
.prog-set b{color:var(--text);}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">MAJAD</div>
  <button class="nav-btn active" id="btn-today" onclick="showView('today')">Today</button>
  <button class="nav-btn" id="btn-plan" onclick="showView('plan')">Program</button>
  <button class="nav-btn" id="btn-progress" onclick="showView('progress')">Progress</button>
</nav>
<div class="view active" id="view-today"></div>
<div class="view" id="view-plan"></div>
<div class="view" id="view-progress"></div>
<script>
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzYdFTp4-qaNw_CVQ06ZLD8g6zZAymBH6l3Ri8tZLbT8wHemx0KBxz29wXSLxXTV_NV/exec';

var PROGRAM = {
  push:{label:'PUSH DAY',color:'#f0c040',muscles:'Chest / Shoulders / Triceps',icon:'💪',
    warmup:['5 min incline walk','Arm circles x10','Band pull-aparts x15','Light DB press x15'],
    exercises:[
      {id:'dbp',name:'Dumbbell Bench Press',tip:'Full ROM, 2sec down',sets:4,reps:'8-10',weight:'50-60 lbs ea',rest:'90-120s'},
      {id:'idp',name:'Incline DB Press',tip:'30-45 incline, stretch at bottom',sets:3,reps:'10-12',weight:'40-50 lbs ea',rest:'75-90s'},
      {id:'fly',name:'DB Flat Fly',tip:'Slight bend, big chest stretch',sets:3,reps:'12-15',weight:'25-35 lbs ea',rest:'60s'},
      {id:'cfl',name:'Cable Fly Low to High',tip:'Squeeze hard at top',sets:3,reps:'12-15',weight:'Moderate',rest:'60s'},
      {id:'sdp',name:'Seated DB Shoulder Press',tip:'Controlled, dont lock out',sets:3,reps:'10-12',weight:'30-40 lbs ea',rest:'75-90s'},
      {id:'lat',name:'Lateral Raises',tip:'Lead with elbows, slight lean forward',sets:3,reps:'12-15',weight:'15-20 lbs ea',rest:'60s'},
      {id:'rpd',name:'Tricep Rope Pushdown',tip:'Spread rope at bottom',sets:3,reps:'10-12',weight:'40-50 lbs',rest:'60s'},
      {id:'ote',name:'Overhead DB Tricep Ext',tip:'Keep elbows tight, full stretch',sets:3,reps:'12-15',weight:'40-50 lbs',rest:'60s'}
    ],
    overload:'Add 5 lbs to DB Bench and Shoulder Press when you hit all reps. Add 1 rep to isolation work weekly.'
  },
  pull:{label:'PULL DAY',color:'#40d0f0',muscles:'Back / Biceps / Rear Delts',icon:'🔙',
    warmup:['5 min row or bike','Dead hangs 20s x2','Band pull-aparts x15','Face pulls x15 light'],
    exercises:[
      {id:'dl',name:'Barbell Deadlift',tip:'Safe solo - hinge, neutral spine',sets:4,reps:'6-8',weight:'Start 135 lbs',rest:'2-3 min'},
      {id:'lpd',name:'Lat Pulldown Wide Grip',tip:'Pull to upper chest, lean back slightly',sets:4,reps:'8-10',weight:'Moderate-heavy',rest:'90s'},
      {id:'scr',name:'Seated Cable Row',tip:'Chest tall, squeeze shoulder blades',sets:3,reps:'10-12',weight:'Moderate',rest:'75s'},
      {id:'dbr',name:'DB Single-Arm Row',tip:'Full stretch at bottom',sets:3,reps:'10-12',weight:'50-60 lbs',rest:'60s'},
      {id:'fp',name:'Face Pulls',tip:'Rope to forehead, elbows high',sets:3,reps:'15-20',weight:'Light',rest:'60s'},
      {id:'hc',name:'DB Hammer Curl',tip:'Neutral grip, no swinging',sets:3,reps:'10-12',weight:'25-30 lbs ea',rest:'60s'},
      {id:'ic',name:'Incline DB Curl',tip:'Full stretch at bottom, slow negative',sets:3,reps:'10-12',weight:'20-25 lbs ea',rest:'60s'}
    ],
    overload:'Add 10 lbs to Deadlift each week while form is solid. Add 5 lbs to rows every 2 weeks.'
  },
  legs:{label:'LEGS DAY',color:'#f06050',muscles:'Quads / Hamstrings / Glutes / Calves',icon:'🦵',
    warmup:['5 min bike','Bodyweight squats x15','Hip circles x10','Glute bridges x15'],
    exercises:[
      {id:'sq',name:'Barbell Back Squat',tip:'Safety bars set - rack catches if fail',sets:4,reps:'6-8',weight:'Start 135 lbs',rest:'2-3 min'},
      {id:'rdl',name:'Romanian Deadlift DB',tip:'Hinge at hips, big hamstring stretch',sets:3,reps:'10-12',weight:'50-60 lbs ea',rest:'90s'},
      {id:'lp',name:'Leg Press',tip:'Full depth, dont lock knees',sets:4,reps:'10-12',weight:'3-4 plates/side',rest:'90s'},
      {id:'lun',name:'Walking DB Lunges',tip:'Knee just above floor, torso tall',sets:3,reps:'12 each',weight:'25-30 lbs ea',rest:'75s'},
      {id:'lc',name:'Leg Curl Machine',tip:'Control the negative 2-3 sec down',sets:3,reps:'12-15',weight:'Moderate',rest:'60s'},
      {id:'le',name:'Leg Extension Machine',tip:'Squeeze at top for 1 sec',sets:3,reps:'12-15',weight:'Moderate',rest:'60s'},
      {id:'cr',name:'Standing Calf Raise',tip:'Full ROM, pause top and bottom',sets:4,reps:'15-20',weight:'BW + stack',rest:'45s'}
    ],
    overload:'Add 10 lbs to Squat weekly. Reduce leg volume slightly in Aug-Sep as marathon nears.'
  }
};

var SCHEDULE = [
  {name:'MON',icon:'🏋️',type:'PUSH',cls:'push'},
  {name:'TUE',icon:'🏃',type:'EASY',cls:'run'},
  {name:'WED',icon:'🏋️',type:'PULL',cls:'pull'},
  {name:'THU',icon:'🏃',type:'TEMPO',cls:'run'},
  {name:'FRI',icon:'🏋️',type:'LEGS',cls:'legs'},
  {name:'SAT',icon:'😴',type:'REST',cls:'rest'},
  {name:'SUN',icon:'🏃',type:'LONG',cls:'run'}
];

var IDX_TO_DAY = {0:'push',2:'pull',4:'legs'};
var IDX_TO_RUN = {
  1:{icon:'🏃',label:'EASY RUN DAY',sub:'Easy run today. Keep it comfortable, conversational pace.'},
  3:{icon:'🏃',label:'TEMPO RUN DAY',sub:'Tempo run today. Comfortably hard - push the pace!'},
  5:{icon:'😴',label:'REST DAY',sub:'Full rest. Recovery is where the gains happen.'},
  6:{icon:'🏃',label:'LONG RUN DAY',sub:'Long run today. Steady pace, enjoy the miles.'}
};
var COLOR_MAP = {push:'#f0c040',pull:'#40d0f0',legs:'#f06050',run:'#50e090',rest:'#555'};
var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

var NOW = new Date();
var TODAY_DOW = NOW.getDay();
var SCHED_TODAY_IDX = (TODAY_DOW === 0) ? 6 : TODAY_DOW - 1;
var TODAY_LABEL = DAY_NAMES[TODAY_DOW] + ', ' + MONTH_NAMES[NOW.getMonth()] + ' ' + NOW.getDate() + ' ' + NOW.getFullYear();
var VIEWING_IDX = SCHED_TODAY_IDX;

function selectDay(i) { VIEWING_IDX = i; renderToday(); }
function saveLog(d) { try { localStorage.setItem('majad_log', JSON.stringify(d)); } catch(e){} }
function loadLog() { try { return JSON.parse(localStorage.getItem('majad_log') || '{}'); } catch(e) { return {}; } }
function getDateKey() { return NOW.getFullYear() + '-' + (NOW.getMonth()+1) + '-' + NOW.getDate(); }
function fmtDate(dk) {
  var p = dk.split('-');
  var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[parseInt(p[1])-1] + ' ' + p[2] + ', ' + p[0];
}

function showView(name) {
  var views = ['today','plan','progress'];
  for(var i=0; i<views.length; i++) {
    document.getElementById('view-'+views[i]).classList.remove('active');
    document.getElementById('btn-'+views[i]).classList.remove('active');
  }
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('btn-'+name).classList.add('active');
  if(name === 'plan') renderPlan();
  if(name === 'progress') renderProgress();
}

function markLogged(inp) {
  inp.classList.toggle('logged', inp.value !== '');
  autoSave();
}

function toggleDone(key) {
  var btn = document.querySelector('#row_' + key + ' .set-done');
  var isChecked = btn.classList.contains('checked');
  btn.classList.toggle('checked', !isChecked);
  btn.innerHTML = isChecked ? '' : '✓';
  autoSave();
  updateCounter();
}

function updateCounter() {
  var done = document.querySelectorAll('.set-done.checked').length;
  var el = document.getElementById('setsDone');
  if(el) el.textContent = done;
}

function getLogKey() { return getDateKey() + '_d' + VIEWING_IDX; }

function autoSave() {
  var p = PROGRAM[IDX_TO_DAY[VIEWING_IDX]];
  if(!p) return;
  var log = loadLog();
  var lk = getLogKey();
  if(!log[lk]) log[lk] = {};
  for(var ei=0; ei<p.exercises.length; ei++) {
    var ex = p.exercises[ei];
    for(var s=1; s<=ex.sets; s++) {
      var key = ex.id + '_s' + s;
      var w = document.getElementById('w_'+key);
      var r = document.getElementById('r_'+key);
      var rpe = document.getElementById('rpe_'+key);
      var done = document.querySelector('#row_'+key+' .set-done');
      log[lk][key] = {
        w: w ? w.value : '',
        r: r ? r.value : '',
        rpe: rpe ? rpe.value : '',
        done: done ? done.classList.contains('checked') : false
      };
    }
  }
  saveLog(log);
}

function syncToSheets(dayLabel, setsArr, msgId) {
  var msg = document.getElementById(msgId);
  if(!msg) return;
  msg.style.display = 'inline';
  msg.style.color = 'var(--muted2)';
  msg.textContent = 'Syncing...';

  var payload = JSON.stringify({date:fmtDate(getDateKey()), day:dayLabel, sets:setsArr});

  // Use image trick to send GET request - most reliable for Google Apps Script
  var url = SHEETS_URL + '?data=' + encodeURIComponent(payload);
  var img = new Image();
  img.onload = img.onerror = function() {
    msg.style.color = 'var(--green)';
    msg.textContent = '✓ Saved and synced!';
    setTimeout(function(){ msg.style.display='none'; }, 3000);
  };
  img.src = url;
}

function finishWorkout() {
  autoSave();
  var p = PROGRAM[IDX_TO_DAY[VIEWING_IDX]];
  if(!p) return;
  var log = loadLog();
  var tlog = log[getLogKey()] || {};
  var sets = [];
  for(var ei=0; ei<p.exercises.length; ei++) {
    var ex = p.exercises[ei];
    for(var s=1; s<=ex.sets; s++) {
      var key = ex.id + '_s' + s;
      var entry = tlog[key] || {};
      if(entry.w || entry.r) {
        sets.push({exercise:ex.name, setNum:s, weight:entry.w||'', reps:entry.r||'', rpe:entry.rpe||'', done:entry.done||false});
      }
    }
  }
  syncToSheets(p.label, sets, 'saveMsg');
}

function saveRun() {
  var dist = document.getElementById('run_dist').value;
  var time = document.getElementById('run_time').value;
  var pace = document.getElementById('run_pace').value;
  var notes = document.getElementById('run_notes').value;
  var log = loadLog();
  var lk = getLogKey();
  if(!log[lk]) log[lk] = {};
  log[lk].run = {dist:dist, time:time, pace:pace, notes:notes};
  saveLog(log);
  var info = IDX_TO_RUN[VIEWING_IDX] || {label:'RUN'};
  var sets = [{exercise:'Run', setNum:1, weight:dist+' miles', reps:time, rpe:pace+' min/mi', done:true}];
  syncToSheets(info.label, sets, 'runSaveMsg');
}

function buildSched() {
  var h = '<div class="sched">';
  for(var i=0; i<SCHEDULE.length; i++) {
    var s = SCHEDULE[i];
    var isToday = (i === SCHED_TODAY_IDX);
    var isSel = (i === VIEWING_IDX);
    var tc = COLOR_MAP[s.cls] || '#555';
    var style = isSel ? ('border-color:'+tc+';background:'+tc+'18;') : '';
    h += '<div class="sd' + (isToday?' today':'') + '" style="' + style + '" onclick="selectDay('+i+')">';
    h += '<div class="sd-name">'+s.name+'</div>';
    h += '<div class="sd-icon">'+s.icon+'</div>';
    h += '<div class="sd-type" style="color:'+tc+'">'+s.type+'</div>';
    if(isToday) h += '<div class="sd-today-lbl">TODAY</div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function renderToday() {
  var el = document.getElementById('view-today');
  var p = PROGRAM[IDX_TO_DAY[VIEWING_IDX]];
  var isToday = (VIEWING_IDX === SCHED_TODAY_IDX);
  var vdow = (VIEWING_IDX === 6) ? 0 : VIEWING_IDX + 1;
  var vDayName = DAY_NAMES[vdow];
  var vLabel = isToday ? TODAY_LABEL : vDayName;
  var titleText = isToday ? 'TODAY' : vDayName.toUpperCase();

  var header = '<div class="sec-label">' + vLabel + (isToday ? '' : ' - PREVIEW') + '</div>';
  header += '<div class="sec-title">' + titleText + '</div>';
  var sched = buildSched();

  // Run or rest day
  if(!p) {
    var info = IDX_TO_RUN[VIEWING_IDX] || {icon:'😴', label:'REST DAY', sub:'Recovery day.'};
    var isRun = (VIEWING_IDX !== 5);
    var body = '';
    if(isRun) {
      var log2 = loadLog();
      var saved2 = (log2[getLogKey()] && log2[getLogKey()].run) ? log2[getLogKey()].run : {};
      body += '<div class="wcard">';
      body += '<div class="wcard-head">';
      body += '<div class="wcard-badge" style="background:rgba(80,224,144,0.12)">'+info.icon+'</div>';
      body += '<div><div class="wcard-title" style="color:var(--green)">'+info.label+'</div>';
      body += '<div class="wcard-sub">'+info.sub+'</div></div></div>';
      body += '<div style="padding:18px 20px">';
      body += '<div class="log-title" style="margin-bottom:14px">Log Your Run</div>';
      body += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">';
      body += '<div style="flex:1;min-width:110px"><div class="run-inp-lbl">Distance (miles)</div>';
      body += '<input class="set-inp" type="number" step="0.01" placeholder="0.00" id="run_dist" value="'+(saved2.dist||'')+'" style="width:100%"></div>';
      body += '<div style="flex:1;min-width:110px"><div class="run-inp-lbl">Time (mm:ss)</div>';
      body += '<input class="set-inp" type="text" placeholder="32:00" id="run_time" value="'+(saved2.time||'')+'" style="width:100%"></div>';
      body += '<div style="flex:1;min-width:110px"><div class="run-inp-lbl">Pace (min/mi)</div>';
      body += '<input class="set-inp" type="text" placeholder="10:30" id="run_pace" value="'+(saved2.pace||'')+'" style="width:100%"></div>';
      body += '</div>';
      body += '<div style="margin-bottom:14px"><div class="run-inp-lbl">Notes</div>';
      body += '<input class="set-inp" type="text" placeholder="How did it feel?" id="run_notes" value="'+(saved2.notes||'')+'" style="width:100%;text-align:left;padding-left:12px"></div>';
      body += '<button class="btn-finish" style="background:var(--green);color:#000" onclick="saveRun()">SAVE RUN</button>';
      body += '<span class="save-msg" id="runSaveMsg" style="margin-left:10px"></span>';
      body += '</div></div>';
    } else {
      body = '<div style="text-align:center;padding:50px 20px">';
      body += '<div style="font-size:52px;margin-bottom:16px">😴</div>';
      body += '<div style="font-family:Barlow Condensed,sans-serif;font-size:30px;font-weight:900;margin-bottom:10px;color:var(--text)">REST DAY</div>';
      body += '<div style="font-size:14px;color:var(--muted2)">Full rest. Recovery is where the gains happen.</div>';
      body += '</div>';
    }
    el.innerHTML = header + sched + body;
    return;
  }

  // Gym day
  var log = loadLog();
  var tlog = log[getLogKey()] || {};
  var c = p.color;
  var totalSets = 0;
  for(var i=0; i<p.exercises.length; i++) totalSets += p.exercises[i].sets;

  var wu = '<div class="warmup-bar"><span class="wu-label">Warm-up</span>';
  for(var i=0; i<p.warmup.length; i++) wu += '<span class="wu-chip">'+p.warmup[i]+'</span>';
  wu += '</div>';

  var exHTML = '';
  for(var ei=0; ei<p.exercises.length; ei++) {
    var ex = p.exercises[ei];
    exHTML += '<div class="ex-row">';
    exHTML += '<div class="ex-top"><div class="ex-num" style="background:'+c+'22;color:'+c+'">'+(ei+1)+'</div>';
    exHTML += '<div><div class="ex-name">'+ex.name+'</div><div class="ex-tip">'+ex.tip+'</div></div></div>';
    exHTML += '<div class="ex-targets">';
    exHTML += '<div class="ex-tg">Sets: <b>'+ex.sets+'</b></div>';
    exHTML += '<div class="ex-tg">Reps: <b>'+ex.reps+'</b></div>';
    exHTML += '<div class="ex-tg">Weight: <b>'+ex.weight+'</b></div>';
    exHTML += '<div class="ex-tg">Rest: <b>'+ex.rest+'</b></div>';
    exHTML += '</div><div class="log-wrap"><div class="log-title">Log Your Sets</div>';
    for(var s=1; s<=ex.sets; s++) {
      var key = ex.id+'_s'+s;
      var sv = tlog[key] || {};
      exHTML += '<div class="set-row" id="row_'+key+'">';
      exHTML += '<div class="set-lbl">Set '+s+'</div>';
      exHTML += '<input class="set-inp'+(sv.w?' logged':'')+'" type="number" placeholder="lbs" id="w_'+key+'" value="'+(sv.w||'')+'" oninput="markLogged(this)">';
      exHTML += '<span class="set-sep">x</span>';
      exHTML += '<input class="set-inp'+(sv.r?' logged':'')+'" type="number" placeholder="reps" id="r_'+key+'" value="'+(sv.r||'')+'" oninput="markLogged(this)">';
      exHTML += '<input class="set-rpe" type="number" placeholder="RPE" min="1" max="10" id="rpe_'+key+'" value="'+(sv.rpe||'')+'">';
      exHTML += '<span class="set-rpe-lbl">RPE</span>';
      exHTML += '<button class="set-done'+(sv.done?' checked':'')+'" onclick="toggleDone(\''+key+'\')">'+(sv.done?'✓':'')+'</button>';
      exHTML += '</div>';
    }
    exHTML += '</div></div>';
  }

  var html = header + sched;
  html += '<div class="wcard">';
  html += '<div class="wcard-head"><div class="wcard-badge" style="background:'+c+'18">'+p.icon+'</div>';
  html += '<div><div class="wcard-title" style="color:'+c+'">'+p.label+'</div>';
  html += '<div class="wcard-sub">'+p.muscles+'</div></div></div>';
  html += '<div class="wcard-stats">';
  html += '<div class="ws-item"><div class="ws-num" style="color:'+c+'">'+p.exercises.length+'</div><div class="ws-label">Exercises</div></div>';
  html += '<div class="ws-item"><div class="ws-num" style="color:'+c+'">'+totalSets+'</div><div class="ws-label">Total Sets</div></div>';
  html += '<div class="ws-item"><div class="ws-num" style="color:'+c+'" id="setsDone">0</div><div class="ws-label">Done</div></div>';
  html += '</div>';
  html += wu;
  html += '<div>'+exHTML+'</div>';
  html += '<div class="finish-wrap">';
  html += '<button class="btn-finish" style="background:'+c+';color:#000" onclick="finishWorkout()">SAVE WORKOUT</button>';
  html += '<span class="save-msg" id="saveMsg"></span>';
  html += '</div></div>';
  html += '<div class="ol-note" style="background:'+c+'0a;border:1px solid '+c+'22">';
  html += '<span>📈</span><span style="font-size:12px;color:'+c+'cc">'+p.overload+'</span></div>';

  el.innerHTML = html;
  updateCounter();
}

function renderPlan() {
  var el = document.getElementById('view-plan');
  var h = '<div class="sec-label">Your Full Program</div><div class="sec-title">PROGRAM</div>';
  var days = ['push','pull','legs'];
  for(var di=0; di<days.length; di++) {
    var p = PROGRAM[days[di]];
    var ts = 0;
    for(var i=0; i<p.exercises.length; i++) ts += p.exercises[i].sets;
    h += '<div class="plan-card" id="pc_'+days[di]+'">';
    h += '<div class="plan-head" onclick="togglePlan(\'pc_'+days[di]+'\')">';
    h += '<div class="plan-dot" style="background:'+p.color+'"></div>';
    h += '<div><div class="plan-day-name" style="color:'+p.color+'">'+p.label+'</div>';
    h += '<div class="plan-muscles">'+p.muscles+'</div></div>';
    h += '<div class="plan-count">'+p.exercises.length+' ex / '+ts+' sets</div>';
    h += '<svg style="margin-left:8px;color:var(--muted);flex-shrink:0" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
    h += '</div><div class="plan-body">';
    h += '<div class="plan-wu">';
    for(var i=0; i<p.warmup.length; i++) h += '<span class="plan-wu-chip">🔥 '+p.warmup[i]+'</span>';
    h += '</div>';
    for(var ei=0; ei<p.exercises.length; ei++) {
      var ex = p.exercises[ei];
      h += '<div class="plan-ex"><div class="plan-en" style="background:'+p.color+'22;color:'+p.color+'">'+(ei+1)+'</div>';
      h += '<div><div class="plan-ex-name">'+ex.name+'</div><div class="plan-ex-tip">'+ex.tip+'</div>';
      h += '<div class="plan-chips">';
      h += '<span class="plan-chip">'+ex.sets+' sets</span>';
      h += '<span class="plan-chip">'+ex.reps+' reps</span>';
      h += '<span class="plan-chip">'+ex.weight+'</span>';
      h += '<span class="plan-chip">Rest '+ex.rest+'</span>';
      h += '</div></div></div>';
    }
    h += '<div class="ol-note" style="background:'+p.color+'0a;border:1px solid '+p.color+'22">';
    h += '<span>📈</span><span style="font-size:12px;color:'+p.color+'cc">'+p.overload+'</span></div>';
    h += '</div></div>';
  }
  el.innerHTML = h;
}

function togglePlan(id) { document.getElementById(id).classList.toggle('open'); }

function renderProgress() {
  var el = document.getElementById('view-progress');
  var log = loadLog();
  var keys = Object.keys(log).sort().reverse();
  var h = '<div class="sec-label">Track Your Gains</div><div class="sec-title">PROGRESS</div>';
  if(keys.length === 0) {
    el.innerHTML = h + '<div class="prog-empty">No sessions logged yet.<br>Complete your first workout to see progress here!</div>';
    return;
  }
  var exMap = {};
  var allDays = ['push','pull','legs'];
  for(var di=0; di<allDays.length; di++) {
    var p = PROGRAM[allDays[di]];
    for(var ei=0; ei<p.exercises.length; ei++) {
      exMap[p.exercises[ei].id] = {name:p.exercises[ei].name, color:p.color, sessions:[]};
    }
  }
  for(var ki=0; ki<keys.length; ki++) {
    var lk = keys[ki];
    var sess = log[lk];
    var date = lk.split('_d')[0];
    var sessKeys = Object.keys(sess);
    for(var si=0; si<sessKeys.length; si++) {
      var sk = sessKeys[si];
      if(sk === 'run') continue;
      var exId = sk.split('_s')[0];
      if(exMap[exId] && (sess[sk].w || sess[sk].r)) {
        var found = null;
        for(var fi=0; fi<exMap[exId].sessions.length; fi++) {
          if(exMap[exId].sessions[fi].date === date) { found = exMap[exId].sessions[fi]; break; }
        }
        if(!found) { found = {date:date, sets:[]}; exMap[exId].sessions.push(found); }
        found.sets.push({w:sess[sk].w, r:sess[sk].r});
      }
    }
  }
  var ids = Object.keys(exMap);
  var hasData = false;
  for(var i=0; i<ids.length; i++) {
    var ex = exMap[ids[i]];
    if(ex.sessions.length === 0) continue;
    hasData = true;
    h += '<div class="prog-card">';
    h += '<div class="prog-head"><div class="prog-dot" style="background:'+ex.color+'"></div>';
    h += '<div class="prog-name">'+ex.name+'</div>';
    h += '<div class="prog-count">'+ex.sessions.length+' session'+(ex.sessions.length>1?'s':'')+'</div></div>';
    h += '<div class="prog-body">';
    var max = Math.min(ex.sessions.length, 3);
    for(var si=0; si<max; si++) {
      var s = ex.sessions[si];
      h += '<div class="prog-sess"><div class="prog-date">'+fmtDate(s.date)+'</div>';
      h += '<div class="prog-sets">';
      for(var pi=0; pi<s.sets.length; pi++) {
        h += '<div class="prog-set">Set '+(pi+1)+': <b>'+s.sets[pi].w+' lbs x '+s.sets[pi].r+'</b></div>';
      }
      h += '</div></div>';
    }
    h += '</div></div>';
  }
  if(!hasData) h += '<div class="prog-empty">Log some sets to see progress!</div>';
  el.innerHTML = h;
}

renderToday();
